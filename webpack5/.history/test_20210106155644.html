<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{margin: 0px; padding: 0px; line-height: 1;}
        .box{max-width: 1200px; border: 1px solid #333; height: 500px; margin: 0 auto;}
        .left{float: left; margin-right: 20px;}
        .right{float: right; margin-left: 20px;}
        .slide{width: 200px; background-color: aquamarine; height: 500px;}
        .content{overflow: hidden; height: 500px; background-color: burlywood;}
    </style>
</head>
<body>
    <div class="box">
        <div class="slide left"></div>
        <!-- <div class="slide right"></div> -->
        <div class="content"></div>
    </div>
</body>
</html>
