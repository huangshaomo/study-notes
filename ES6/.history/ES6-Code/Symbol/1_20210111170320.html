<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        const sym = Symbol();
        const a = {};
        a[sym] = "hello!"    //不加方括号就只是普通字符串
        console.log(a);
        console.log(a[sym]);    //undefined

        console.log(a.sym);     //hello!
        console.log(a["sym"]);  //hello!
    </script>
</body>

</html>
