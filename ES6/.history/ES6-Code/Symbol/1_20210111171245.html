    <script>
        const color_red = Symbol();
        const color_green = Symbol();

        function getComplement(color){
            switch(color){
                case color_red:
                    return color_green;
                case color_green:
                    return  color_red;
                default:
                    throw new Error('undefiend color');
            }
        }
        console.log(getComplement(color_red));
    </script>
